services:
  mongodb:
    image: mongo:7
    container_name: chatr_mongodb_prod
    networks:
      - app_network
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatr_redis_prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: chatr_backend_prod
    expose:
      - "5001"
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - MONGO_DB_URI=mongodb://mongodb:27017/chatapp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - ALLOWED_ORIGINS=http://localhost
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: production
    container_name: chatr_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:
  redis_data:

networks:
  app_network:
    driver: bridge