# ║                    CHATR HELM CHART — values.yaml                          ║
# ║  DEFAULT configuration (overridden by values-prod.yaml in production)      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

global:
  namespace: chatr
  imageRegistry: "" # Overridden in prod

backend:
  replicaCount: 1
  image:
    repository: chatr-backend
    tag: "v2"
    pullPolicy: Always
  port: 5001
  service:
    type: ClusterIP
    port: 5001
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 400m
      memory: 512Mi
  livenessProbe:
    path: /api/health
    port: 5001
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    path: /api/health
    port: 5001
    initialDelaySeconds: 10
    periodSeconds: 5

config:
  nodeEnv: development
  redisHost: redis
  redisPort: "6379"
  allowedOrigins: "http://localhost"
  useHttps: "false"

# 🔐 FIXED: No full Mongo URI anymore
secrets:
  jwtSecret: "dev-secret-change-in-prod"

  mongo:
    username: "chatr_admin"
    password: "devmongo59"

mongodb:
  enabled: true
  replicaCount: 1
  image:
    repository: mongo
    tag: "7"
    pullPolicy: IfNotPresent
  port: 27017
  service:
    type: ClusterIP
    clusterIP: None
    port: 27017
  auth:
    rootUsername: chatr_admin
    mongodbRootPassword: "devmongo59"  # ⚠️ must match secrets.mongo.password
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 400m
      memory: 1Gi
  livenessProbe:
    port: 27017
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    port: 27017
    initialDelaySeconds: 10
    periodSeconds: 5

redis:
  enabled: true
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 256Mi
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5

nginx:
  replicaCount: 1
  image:
    repository: chatr-nginx
    tag: "v2"
    pullPolicy: Always
  port: 80
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 256Mi
  livenessProbe:
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}
  tls: []