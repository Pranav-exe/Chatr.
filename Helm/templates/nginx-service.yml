{{/*
  NGINX SERVICE
  
  TRAFFIC FLOW depends on whether Ingress is enabled:
  
  WITHOUT Ingress (ingress.enabled = false):
    type: LoadBalancer → GKE provisions a public IP and Cloud Load Balancer.
    Internet → LoadBalancer:80 → nginx pod → /api/* → backend:5001
  
  WITH Ingress (ingress.enabled = true):
    type: ClusterIP → internal only. Ingress Controller handles external traffic.
    Internet → Ingress Controller → ClusterIP:80 → nginx pod → /api/* → backend:5001
  
  WHY THE SWITCH?
  When Ingress is enabled, the Ingress Controller already has a LoadBalancer.
  If nginx ALSO had a LoadBalancer, you'd pay for TWO cloud LBs (waste of money).
  So we force ClusterIP to make nginx internal-only when Ingress handles routing.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    {{- include "chatr.componentLabels" (dict "component" "nginx" "context" .) | nindent 4 }}
spec:
  {{- if .Values.ingress.enabled }}
  # Ingress is handling external traffic, so this service is internal only.
  type: ClusterIP
  {{- else }}
  # No Ingress — this service is the public entry point.
  type: {{ .Values.nginx.service.type }}
  {{- end }}
  selector:
    {{- include "chatr.selectorLabels" "nginx" | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: {{ .Values.nginx.port }}