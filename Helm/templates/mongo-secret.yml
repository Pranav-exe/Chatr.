{{/*
  MONGODB SECRET
  Root credentials for MongoDB's first-boot initialization.
  The official mongo:7 image reads MONGO_INITDB_ROOT_USERNAME and
  MONGO_INITDB_ROOT_PASSWORD to create the admin user on its first startup.
*/}}
{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  labels:
    {{- include "chatr.componentLabels" (dict "component" "mongodb" "context" .) | nindent 4 }}
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongo.username | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongo.password | quote }}
{{- end }}
