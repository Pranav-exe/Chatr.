# ╔══════════════════════════════════════════════════════════════════╗
# ║  values-prod.yaml — Production Environment Overrides           ║
# ║                                                                ║
# ║  USAGE:                                                        ║
# ║    helm install chatr ./chatr-chart -f values-prod.yaml -n chatr --create-namespace \
# ║      --set secrets.jwtSecret="REAL_SECRET" \                   ║
# ║      --set secrets.mongoDbUri="mongodb://..." \                ║
# ║      --set mongodb.auth.rootPassword="REAL_PASSWORD"           ║
# ║                                                                ║
# ║  ⚠️  NEVER put real secrets in this file!                      ║
# ║  Always pass them via --set at deploy time.                    ║
# ╚══════════════════════════════════════════════════════════════════╝

global:
  imageRegistry: asia-south1-docker.pkg.dev/project-092b20ff-9e3c-4ee0-95f/chatr-repo

backend:
  replicaCount: 2  # 2 pods for high availability
  image:
    repository: chatr-backend
    tag: "v1"  # Pin to specific version in prod (never use "latest")
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

config:
  nodeEnv: production
  allowedOrigins: ""  # Change to your real domain
  useHttps: "true"

mongodb:
  persistence:
    size: 20Gi  # More storage for production data
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

nginx:
  replicaCount: 2  # 2 pods for high availability
  image:
    repository: chatr-nginx
    tag: "v1"
    pullPolicy: Always
  service:
    type: LoadBalancer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
