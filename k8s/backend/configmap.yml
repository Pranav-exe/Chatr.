apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: chatr
data:
  # ── Server Configuration ──
  PORT: "5001"
  NODE_ENV: production
  # ── Redis ──
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  # ── CORS ──
  ALLOWED_ORIGINS: "http://34.100.186.101"
  # ── HTTPS ──
  USE_HTTPS: "false"
  # NOTE: MONGO_DB_URI is in the Secret (not here) because it contains credentials