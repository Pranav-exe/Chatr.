apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: chatr
type: Opaque
# ── MongoDB Root Credentials ──
# These are passed to the mongo:7 container as env vars to enable authentication.
# The official MongoDB image uses these on first startup to create the root user.
# Must match the credentials in k8s/backend/secret.yml
stringData:
  MONGO_INITDB_ROOT_USERNAME: chatr_admin
  MONGO_INITDB_ROOT_PASSWORD: HoneyBump6969
