{{/*
  BACKEND SECRET
  Sensitive environment variables for the backend.
  
  WHAT CHANGED:
  - JWT_SECRET: hardcoded     → reads from .Values.secrets.jwtSecret
  - MONGO_DB_URI: hardcoded   → reads from .Values.secrets.mongoDbUri
  
  ⚠️  SECURITY NOTE:
  In production, don't put real secrets in values.yaml!
  Override at deploy time:
    helm install chatr ./chatr-chart \
      --set secrets.jwtSecret="my-real-jwt-key" \
      --set secrets.mongoDbUri="mongodb://user:pass@host:27017/db"
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    {{- include "chatr.componentLabels" (dict "component" "backend" "context" .) | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  MONGO_DB_URI: {{ .Values.secrets.mongoDbUri | quote }}
