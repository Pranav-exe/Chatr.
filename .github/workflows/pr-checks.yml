name: PR Checks
on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint Helm chart
        run: |
          helm lint ./Helm

      - name: Template Helm chart
        run: |
          helm template test-release ./Helm > /dev/null
          echo "✅ Chart templates rendered successfully"

      - name: Template with dev values
        run: |
          helm template test-release ./Helm -f ./Helm/values-dev.yaml > /dev/null
          echo "✅ Dev values validated"

      - name: Template with prod values
        run: |
          helm template test-release ./Helm -f ./Helm/values-prod.yaml > /dev/null
          echo "✅ Prod values validated"

  trivy-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Trivy
        run:
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.50.0

      - name: Trivy config scan
        run: trivy config --severity HIGH,CRITICAL --exit-code 0 ./Helm
