name: CI-CD
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  REGISTRY: asia-south1-docker.pkg.dev
  PROJECT_ID: project-092b20ff-9e3c-4ee0-95f
  REPO: chatr-repo
  IMAGE_TAG: ${{ github.sha }}
  EMAIL_ADDRESS: "github-actions[bot]@users.noreply.github.com"

jobs:
  build-and-push:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev
          echo "✅ Docker configured for Artifact Registry"

      - name: Set up BuildKit
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image
        run: |
          docker buildx build \
          --platform linux/amd64 \
          --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/chatr-backend:${{ env.IMAGE_TAG }}" \
          --push \
          server/

      - name: Build and push Frontend image
        run: |
          docker buildx build \
          --platform linux/amd64 \
          --file ./client/Dockerfile \
          --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/chatr-nginx:${{ env.IMAGE_TAG }}" \
          --push \
          .

  update-image-tags:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags in Helm values
        run: |
          # 1. Update backend tags in both files
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values-dev.yaml
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values-prod.yaml
          
          # 2. Update nginx tags in both files
          yq -i '.nginx.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values-dev.yaml
          yq -i '.nginx.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values-prod.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "${{ env.EMAIL_ADDRESS }}"
          git add Helm/values-dev.yaml Helm/values-prod.yaml
          # Only commit and push if there are actual changes
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }}"
          git push